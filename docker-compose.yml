version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - apache1
      - apache2

  apache1:
    image: httpd:latest
    container_name: apache_backend_1
    volumes:
      - ./html:/usr/local/apache2/htdocs
    expose:
      - "80"

  apache2:
    image: httpd:latest
    container_name: apache_backend_2
    volumes:
      - ./html:/usr/local/apache2/htdocs
    expose:
      - "80"

volumes:
  nginx-cache:
