<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster Apache + Nginx LB</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a2e; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #e94560; }
        p { font-size: 1.1rem; color: #e0e0e0; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        img, video { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: block; margin: 0 auto; }
        .st-card { background: #16213e; padding: 20px; border-radius: 12px; max-width: 420px; width: 100%; border: 1px solid #0f3460; transition: transform 0.3s; }
        .st-card:hover { transform: translateY(-5px); }
        .st-card h3 { color: #0f3460; background: #fff; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-top: 0; }
    </style>
</head>
<body>
    <h1>¡Hola desde el Cluster de Apache!</h1>
    <p>Esta página web está siendo servida a través de <strong>Nginx actuando como Reverse Proxy con Balanceador de Carga y Caché</strong>.</p>
    <div class="st-card" style="max-width: 600px; margin: 20px auto; border-color: #e94560;">
        <h3>Monitor del Balanceador (Nginx)</h3>
        <div id="server-status" style="background:#0f3460; display:block; padding:15px; border-radius:8px; font-weight:bold; font-size:1.4rem; border: 2px solid #e94560; transition: all 0.5s ease;">
            Iniciando monitor...
        </div>
        
        <div style="margin-top: 15px;">
            <button onclick="checkServer()" style="background:#e94560; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Refrescar conexión</button>
            <button onclick="runStressTest()" id="btn-test" style="background:#0f3460; color:white; border:1px solid #e94560; padding:10px 20px; border-radius:5px; cursor:pointer; margin-left:10px;">Test de 10 peticiones (Round Robin)</button>
        </div>

        <div style="margin-top: 20px; text-align: left; background: #0a0a1a; padding: 10px; border-radius: 5px;">
            <strong style="color: #e94560; font-size: 0.9rem;">Historial Reciente (Saltando Caché):</strong>
            <ul id="history" style="list-style: none; padding: 0; margin-top: 10px; font-family: monospace; font-size: 0.85rem;">
                <!-- Aquí aparecerá el historial -->
            </ul>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('server-status');
        const historyList = document.getElementById('history');
        const historyArr = [];

        function updateUI(apache, ip, fromCache) {
            const isApache1 = apache.includes('1');
            const color = isApache1 ? '#3498db' : '#2ecc71';
            
            statusBox.style.borderColor = color;
            statusBox.innerHTML = `Atendido por: <span style="color:${color}">${apache}</span><br>
                                   <small style="font-size:0.8rem; font-weight:normal;">IP: ${ip} | Cache: ${fromCache}</small>`;
            
            // Añadir al historial
            const time = new Date().toLocaleTimeString();
            const logItem = `<li style="border-bottom: 1px solid #16213e; padding: 3px 0;">
                                [${time}] <span style="color:${color}">${apache}</span> » ${ip}
                             </li>`;
            historyArr.unshift(logItem);
            if(historyArr.length > 5) historyArr.pop();
            historyList.innerHTML = historyArr.join('');
        }

        async function checkServer() {
            try {
                // Forzamos bypass de cache con ?t=
                const res = await fetch('/?t=' + Date.now(), { method: 'HEAD' });
                const apache = res.headers.get('X-Apache-Server') || 'Desconocido';
                const ip = res.headers.get('X-Backend-Server') || 'N/A';
                const cache = res.headers.get('X-Proxy-Cache') || 'MISS';
                updateUI(apache, ip, cache);
            } catch (e) {
                statusBox.innerHTML = 'Error conectando con el balanceador';
            }
        }

        async function runStressTest() {
            const btn = document.getElementById('btn-test');
            btn.disabled = true;
            btn.innerText = 'Ejecutando...';
            for(let i=0; i<10; i++) {
                await checkServer();
                await new Promise(r => setTimeout(r, 300)); // Pequeña pausa para ver el efecto
            }
            btn.disabled = false;
            btn.innerText = 'Test de 10 peticiones (Round Robin)';
        }

        // Ejecutar al cargar
        checkServer();
    </script>
    <div class="grid">
        <div class="st-card">
            <h3>Imagen 1</h3>
            <img src="images/img1.jpg" alt="Imagen de ejemplo 1">
        </div>
        <div class="st-card">
            <h3>Imagen 2</h3>
            <img src="images/img2.jpg" alt="Imagen de ejemplo 2">
        </div>
        <div class="st-card">
            <h3>Imagen 3</h3>
            <img src="images/img3.jpg" alt="Imagen de ejemplo 3">
        </div>
        <div class="st-card">
            <h3>Video de Muestra Corto</h3>
            <video controls>
                <source src="videos/sample.mp4" type="video/mp4">
                Tu navegador no soporta videos HTML5.
            </video>
        </div>
    </div>
</body>
</html>
